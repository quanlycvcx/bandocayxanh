        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }

        var googleSearchMarker = null;

        function toggleSearchLoading(isLoading) {

        }

        async function searchGoogleAddress() {
            const query = document.getElementById('google-search-input').value.trim();
            if (!query) return;
            
            toggleSearchLoading(true);
            try {
                const url = `https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(query)}&key=${googleApiKey}&language=vi`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.status === 'OK' && data.results.length > 0) {
                    const loc = data.results[0].geometry.location;
                    const addr = data.results[0].formatted_address;
                    
                    // Di chuyển bản đồ tới vị trí tìm thấy
                    map.setView([loc.lat, loc.lng], 15);
                    
                    // Xóa marker cũ nếu có
                    if (googleSearchMarker) {
                        map.removeLayer(googleSearchMarker);
                    }
                    
                    // Tạo marker mới tại vị trí tìm kiếm thành công
                    googleSearchMarker = L.marker([loc.lat, loc.lng]).addTo(map)
                        .bindPopup(`<b>Kết quả tìm kiếm:</b><br>${addr}`)
                        .openPopup();
                } else { 
                    alert("Không thể tìm thấy địa chỉ: " + data.status); 
                }
            } catch (e) { 
                alert("Lỗi kết nối hệ thống tìm kiếm: " + e.message); 
            } finally { 
                toggleSearchLoading(false); 
            }
        }

        // Tạo Debounce chống spam request liên tục
        function debounce(func, wait) { 
            let timeout; 
            return function(...args) { 
                clearTimeout(timeout); 
                timeout = setTimeout(() => func.apply(this, args), wait); 
            }; 
        }

        // Gán sự kiện cho nút tìm kiếm và phím Enter
        document.getElementById('google-search-button').addEventListener('click', debounce(searchGoogleAddress, 300));
        document.getElementById('google-search-input').addEventListener('keypress', function (e) { 
            if (e.key === 'Enter') {
                debounce(searchGoogleAddress, 300)(); 
            }
        });
